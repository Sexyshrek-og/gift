<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Forever Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --royal-violet: #9400d3;
            --accent-gold: #d4af37;
            --soft-gold: #f1d592;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at top, #2b0042 0%, #0a0a0a 100%);
            color: var(--text-white);
            font-family: 'Lato', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Luxury Header */
        .header-section {
            text-align: center;
            padding: 80px 20px 20px;
            z-index: 2;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--accent-gold);
            margin: 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .countdown-box {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 5px;
            color: var(--text-white);
            border-bottom: 2px solid var(--royal-violet);
            padding: 15px 30px;
            margin-top: 20px;
            display: inline-block;
        }

        /* Photo Gallery - Updated to 4 Slots */
        .gallery-container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            padding: 60px 0;
            z-index: 2;
        }

        @media (max-width: 600px) {
            .gallery-container {
                grid-template-columns: 1fr;
            }
        }

        .photo-frame {
            position: relative;
            border-radius: 40px; /* Enhanced rounded luxury corners */
            overflow: hidden;
            height: 500px;
            border: 2px solid rgba(148, 0, 211, 0.2);
            transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.8s ease;
        }

        .photo-frame:hover {
            transform: scale(1.03);
            border-color: var(--accent-gold);
            box-shadow: 0 25px 60px rgba(148, 0, 211, 0.5);
        }

        /* The Surprise Golden Button */
        .action-area {
            text-align: center;
            padding: 60px 20px 100px;
            z-index: 2;
        }

        .btn-surprise {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            color: #000;
            border: none;
            padding: 22px 60px;
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .btn-surprise:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.8);
        }

        #love-note {
            display: none;
            margin-top: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--soft-gold);
            max-width: 800px;
            line-height: 1.5;
            animation: luxuryReveal 3s ease forwards;
        }

        @keyframes luxuryReveal {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .floating-element {
            position: fixed;
            color: var(--royal-violet);
            font-size: 25px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
            animation: moveUp 7s linear infinite;
        }

        @keyframes moveUp {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body onload="attemptAutoplay()">

    <audio id="loveMusic" loop autoplay>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="header-section">
        <h1>To My Forever Love</h1>
        <div id="countdown" class="countdown-box">8d 00h 00m 00s</div>
    </div>

    <div class="gallery-container">
        <div class="photo-frame"><img src="PHOTO_URL_1" alt="Memory 1"></div>
        <div class="photo-frame"><img src="PHOTO_URL_2" alt="Memory 2"></div>
        <div class="photo-frame"><img src="PHOTO_URL_3" alt="Memory 3"></div>
        <div class="photo-frame"><img src="PHOTO_URL_4" alt="Memory 4"></div>
    </div>

    <div class="action-area">
        <button class="btn-surprise" onclick="startSurprise()">A Message For You</button>
        <div id="love-note">
            "Every day is a countdown to celebrating the most amazing person I know. I love you with all my heart."
        </div>
    </div>

    <script>
        // MUSIC AUTOPLAY LOGIC
        const music = document.getElementById("loveMusic");

        function attemptAutoplay() {
            music.play().catch(error => {
                console.log("Autoplay prevented by browser. Music will start on button click.");
            });
        }

        // COUNTDOWN TIMER
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 8);

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(updateTimer, 1000);

        // SURPRISE FUNCTION
        function startSurprise() {
            const note = document.getElementById("love-note");
            const btn = document.querySelector(".btn-surprise");

            // Ensure music plays if it was blocked
            music.play();
            
            note.style.display = "block";
            btn.style.display = "none";
        }

        // FLOATING VIOLET HEARTS
        function spawnHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-element');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 5) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(spawnHeart, 600);
    </script>
</body>
</html>
